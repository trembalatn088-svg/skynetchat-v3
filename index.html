<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNETchat V3 | Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        
        <nav class="side-menu">
            <div class="menu-logo"><span class="logo-s">S</span> SKYNETchat</div>
            <button class="menu-item"><i class="fas fa-edit"></i> Novo chat</button>
            <button class="menu-item"><i class="fas fa-image"></i> Imagens <span class="badge">BETA</span></button>
            <button class="menu-item"><i class="fas fa-history"></i> Histórico</button>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <button id="toggle-menu" class="icon-btn"><i class="fas fa-bars"></i></button>
                <div class="theme-switcher">
                    <button class="theme-btn" data-set-theme="light"><i class="fas fa-sun"></i> Modo Claro</button>
                    <button class="theme-btn active" data-set-theme="dark">V3 <span class="dot-red"></span></button>
                    <button class="theme-btn" data-set-theme="red">V3 MAX <span class="badge-pro">PRO</span></button>
                </div>
                <button class="icon-btn"><i class="fas fa-edit"></i></button>
            </header>

            <div id="chat-window" class="chat-window">
                <div class="welcome-screen">
                    <h2>Apresentamos o <span>SKYNETchat</span></h2>
                    <p>Sua inteligência artificial avançada sem censura</p>
                    
                                        <div class="tools-grid">
                        <button id="btn-web" class="tool-card"><i class="fas fa-globe text-blue"></i> Busca Geral</button>
                        <button id="btn-osint" class="tool-card"><i class="fas fa-eye text-red"></i> OSINT <span class="badge-pro">PRO</span></button>
                        <button id="btn-pentest" class="tool-card"><i class="fas fa-shield-alt text-red"></i> Pentest Assistant <span class="badge-pro">PRO</span></button>
                        <button id="btn-code" class="tool-card"><i class="fas fa-code text-green"></i> Programar</button>
                    </div>
                    
                        <button class="tool-card"><i class="fas fa-globe text-blue"></i> Busca na Web</button>
                        <button class="tool-card"><i class="fas fa-eye text-red"></i> OSINT <span class="badge-pro">PRO</span></button>
                        <button class="tool-card"><i class="fas fa-shield-alt text-red"></i> Pentest Assistant <span class="badge-pro">PRO</span></button>
                        <button class="tool-card"><i class="fas fa-code text-green"></i> Programar</button>
                    </div>
                </div>
            </div>

            <footer class="bottom-bar">
                <div class="input-wrapper">
                    <button class="action-btn"><i class="fas fa-plus"></i></button>
                    <textarea id="user-input" placeholder="Explore qualquer assunto..." rows="1"></textarea>
                    <button class="action-btn"><i class="fas fa-microphone"></i></button>
                    <button id="send-btn" class="send-btn"><i class="fas fa-arrow-up"></i></button>
                </div>
            </footer>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
